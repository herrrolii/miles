name: Sync Strava Heatmap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          test -n "$STRAVA_CLIENT_ID" || (echo "Missing secret STRAVA_CLIENT_ID" && exit 1)
          test -n "$STRAVA_CLIENT_SECRET" || (echo "Missing secret STRAVA_CLIENT_SECRET" && exit 1)
          test -n "$STRAVA_REFRESH_TOKEN" || (echo "Missing secret STRAVA_REFRESH_TOKEN" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Seed token file from refresh token secret
        env:
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          mkdir -p data
          cat > data/strava-tokens.json <<EOF
          {
            "refresh_token": "$STRAVA_REFRESH_TOKEN",
            "access_token": "placeholder",
            "expires_at": 0
          }
          EOF

      - name: Sync data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: npm run sync:strava

      - name: Commit updated heatmap data
        run: |
          git add docs/heatmap-data.json

          if git diff --cached --quiet; then
            echo "No heatmap changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update heatmap data"
          git push
