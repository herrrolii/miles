<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Consumer Example</title>
    <link rel="stylesheet" href="/widget/run-heatmap.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #ffffff;
      }

      .demo-mount {
        max-width: 100%;
        width: min(1100px, 100%);
      }

      .demo-mount run-heatmap {
        display: block;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="demo-mount">
      <run-heatmap
        data-url="https://your-data-host.example/heatmap-data.json"
        theme="light"
      ></run-heatmap>
    </div>

    <script src="/widget/run-heatmap.js"></script>
  </body>
</html>
