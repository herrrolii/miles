<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miles Preview</title>
    <link rel="stylesheet" href="./consumer-example/widget/run-heatmap.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background: #ffffff;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: calc(100vh - 48px);
        display: flex;
        flex-direction: column;
      }

      .intro {
        max-width: 900px;
      }

      .widget-stage {
        flex: 1;
        display: grid;
        place-items: center;
      }

      .widget-mount {
        max-width: 100%;
        width: fit-content;
      }

      .widget-mount run-heatmap {
        display: block;
        max-width: 100%;
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="intro">
        <h1>Miles Preview</h1>
        <p>
          This preview reads from <code>producer/dist/heatmap-data.json</code> and renders using the widget in
          <code>consumer-example/widget</code>.
        </p>
      </div>
      <div class="widget-stage">
        <div class="widget-mount">
          <run-heatmap data-url="./producer/dist/heatmap-data.json" theme="light"></run-heatmap>
        </div>
      </div>
    </main>
    <script src="./consumer-example/widget/run-heatmap.js"></script>
  </body>
</html>
